<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}DataAnalyst AI{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --brand:       #6366f1;
      --brand-dark:  #4f46e5;
      --brand-light: #eef2ff;
      --success:     #10b981;
      --warn-bg:     #fffbeb;
      --warn-border: #f59e0b;
      --warn-text:   #92400e;
      --err:         #ef4444;
      --bg:          #f1f5f9;
      --surface:     #ffffff;
      --border:      #e2e8f0;
      --muted:       #64748b;
      --text:        #0f172a;
      --text-soft:   #334155;
      --radius:      12px;
      --radius-sm:   8px;
      --shadow:      0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
      --shadow-md:   0 4px 6px -1px rgba(0,0,0,.07), 0 2px 4px -2px rgba(0,0,0,.05);
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      font-size: 15px;
      min-height: 100vh;
    }

    /* ── Nav ─────────────────────────────────────────── */
    .nav {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 10;
    }
    .nav-inner {
      max-width: 860px; margin: 0 auto;
      padding: 0 1.25rem;
      height: 56px;
      display: flex; align-items: center; gap: 0.75rem;
    }
    .nav-logo {
      display: flex; align-items: center; gap: 0.5rem;
      font-weight: 700; font-size: 1rem; color: var(--text);
      text-decoration: none;
    }
    .nav-logo svg { color: var(--brand); }
    .nav-logo:hover { color: var(--brand); }

    /* ── Layout ──────────────────────────────────────── */
    .page { max-width: 860px; margin: 0 auto; padding: 2rem 1.25rem 4rem; }

    /* ── Cards ───────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.75rem;
      box-shadow: var(--shadow);
      margin-bottom: 1.25rem;
    }
    .card-sm { padding: 1.25rem 1.5rem; }

    /* ── Typography ──────────────────────────────────── */
    h1 { font-size: 1.6rem; font-weight: 700; letter-spacing: -.02em; line-height: 1.3; }
    h2 { font-size: 1.05rem; font-weight: 600; letter-spacing: -.01em; }
    .label { font-size: 0.75rem; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.4rem; }
    .muted { color: var(--muted); font-size: 0.875rem; }
    a { color: var(--brand); text-decoration: none; }
    a:hover { text-decoration: underline; color: var(--brand-dark); }

    /* ── Buttons ─────────────────────────────────────── */
    .btn {
      display: inline-flex; align-items: center; gap: 0.4rem;
      padding: 0.55rem 1.25rem;
      background: var(--brand); color: #fff;
      border: none; border-radius: var(--radius-sm);
      cursor: pointer; font-size: 0.9rem; font-weight: 600;
      font-family: inherit;
      transition: background .15s, transform .1s;
    }
    .btn:hover { background: var(--brand-dark); text-decoration: none; }
    .btn:active { transform: scale(.98); }
    .btn-ghost {
      background: transparent; color: var(--brand);
      border: 1.5px solid var(--border);
    }
    .btn-ghost:hover { background: var(--brand-light); border-color: var(--brand); }

    /* ── Forms ───────────────────────────────────────── */
    .field { margin-bottom: 1rem; }
    .field label { display: block; font-size: 0.85rem; font-weight: 500; margin-bottom: 0.4rem; color: var(--text-soft); }
    textarea, input[type=text] {
      width: 100%; padding: 0.65rem 0.85rem;
      border: 1.5px solid var(--border); border-radius: var(--radius-sm);
      font-size: 0.95rem; font-family: inherit; color: var(--text);
      background: #fafafa;
      transition: border-color .15s, box-shadow .15s;
      resize: vertical;
    }
    textarea { min-height: 90px; }
    textarea:focus, input[type=text]:focus {
      outline: none; border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(99,102,241,.12);
      background: #fff;
    }

    /* ── File upload zone ────────────────────────────── */
    .upload-zone {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 2.5rem 1.5rem;
      text-align: center;
      cursor: pointer;
      transition: border-color .2s, background .2s;
      margin-bottom: 1rem;
    }
    .upload-zone:hover { border-color: var(--brand); background: var(--brand-light); }
    .upload-zone input[type=file] { display: none; }
    .upload-icon { font-size: 2.25rem; margin-bottom: 0.5rem; }
    .upload-zone .hint { font-size: 0.83rem; color: var(--muted); margin-top: 0.3rem; }
    .upload-zone .selected-name { font-size: 0.9rem; font-weight: 500; color: var(--brand); margin-top: 0.4rem; display: none; }

    /* ── Tags / Chips ────────────────────────────────── */
    .tags { display: flex; flex-wrap: wrap; gap: 0.35rem; margin-top: 0.6rem; }
    .tag {
      display: inline-flex; align-items: center;
      background: var(--brand-light); color: var(--brand-dark);
      font-size: 0.78rem; font-weight: 500;
      padding: 0.2rem 0.6rem; border-radius: 999px;
    }

    /* ── Stat pills (usage) ──────────────────────────── */
    .stats-row { display: flex; flex-wrap: wrap; gap: 0.65rem; margin-top: 0.1rem; }
    .stat-pill {
      display: inline-flex; align-items: center; gap: 0.35rem;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 999px; padding: 0.3rem 0.85rem;
      font-size: 0.82rem; color: var(--text-soft);
    }
    .stat-pill strong { color: var(--text); font-weight: 600; }
    .stat-pill .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--brand); flex-shrink: 0; }

    /* ── Answer pre ──────────────────────────────────── */
    .answer-body {
      background: #f8fafc; border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 1.25rem;
      font-size: 0.95rem; line-height: 1.75;
      white-space: pre-wrap; word-break: break-word;
      color: var(--text-soft);
    }

    /* ── History item ────────────────────────────────── */
    .history-item { margin-bottom: 1rem; }
    .history-q { font-weight: 600; font-size: 0.95rem; margin-bottom: 0.5rem; }
    .history-a {
      background: #f8fafc; border-left: 3px solid var(--brand);
      padding: 0.75rem 1rem; border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
      font-size: 0.9rem; color: var(--text-soft);
      white-space: pre-wrap; word-break: break-word;
      margin-bottom: 0.6rem;
    }
    .history-err { color: var(--err); font-size: 0.88rem; margin-bottom: 0.4rem; }

    /* ── Banners ─────────────────────────────────────── */
    .stub-banner {
      background: var(--warn-bg); border: 1px solid var(--warn-border);
      border-radius: var(--radius-sm); padding: 0.7rem 1rem;
      margin-bottom: 1.25rem; font-size: 0.875rem; color: var(--warn-text);
      display: flex; align-items: flex-start; gap: 0.5rem;
    }
    .err-banner {
      background: #fef2f2; border: 1px solid #fca5a5;
      border-radius: var(--radius-sm); padding: 1.25rem 1.5rem;
      color: #7f1d1d;
    }

    /* ── Breadcrumb / sub-nav ────────────────────────── */
    .breadcrumb { font-size: 0.85rem; color: var(--muted); margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.4rem; }
    .breadcrumb a { color: var(--muted); }
    .breadcrumb a:hover { color: var(--brand); }
    .breadcrumb span { color: var(--border); }

    /* ── Divider ─────────────────────────────────────── */
    hr { border: none; border-top: 1px solid var(--border); margin: 1.25rem 0; }

    /* ── Page actions bar ────────────────────────────── */
    .actions { display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap; margin-top: 1.5rem; }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="nav-inner">
      <a href="/" class="nav-logo">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/>
        </svg>
        DataAnalyst AI
      </a>
    </div>
  </nav>

  <div class="page">
    {% if llm_provider == "stub" %}
    <div class="stub-banner">
      <span>⚠️</span>
      <span><strong>Stub mode</strong> — No OpenRouter API key found. Answers are placeholders.
      Set <code>DATAANALYSIS_OPENROUTER_API_KEY</code> in <code>.env</code> to enable real AI analysis.</span>
    </div>
    {% endif %}
    {% block content %}{% endblock %}
  </div>

  <script>
    // File upload zone: show selected filename
    document.querySelectorAll('.upload-zone').forEach(zone => {
      const input = zone.querySelector('input[type=file]');
      const nameEl = zone.querySelector('.selected-name');
      if (!input) return;
      zone.addEventListener('click', () => input.click());
      input.addEventListener('change', () => {
        if (input.files[0] && nameEl) {
          nameEl.textContent = '📎 ' + input.files[0].name;
          nameEl.style.display = 'block';
        }
      });
    });
  </script>
</body>
</html>
