[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "blogforge"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "google-generativeai>=0.8",
    "langgraph>=0.2",
    "fastapi>=0.115",
    "uvicorn[standard]>=0.30",
    "sqlalchemy>=2.0",
    "alembic>=1.13",
    "apscheduler>=3.10",
    "markdown>=3.6",
    "croniter>=3.0",
    "pydantic>=2.0",
    "pydantic-settings>=2.0",
    "duckduckgo-search>=6.0",
    "tavily-python>=0.5",
    "aiofiles>=23.0",
    "greenlet>=3.0",
    "httpx>=0.27",
]

[project.scripts]
blogforge = "blogforge.__main__:main"

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "mypy>=1.10",
]

[tool.hatch.build.targets.wheel]
packages = ["src/blogforge"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.mypy]
strict = true
python_version = "3.12"
