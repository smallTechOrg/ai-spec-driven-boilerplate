{% extends "base.html" %}

{% block title %}appname{% endblock %}

{% block content %}
<h1>appname</h1>

<div class="card">
  <form method="post" action="/run">
    <label for="input">Message</label>
    <textarea id="input" name="input" rows="4" placeholder="Type a message…">{{ input or "" }}</textarea>
    <button type="submit">Send</button>
  </form>
</div>

{% if result %}
<div class="card">
  <p class="result">{{ result }}</p>
</div>
{% endif %}

{% if error %}
<div class="card">
  <p class="error">{{ error }}</p>
  <p><a href="/">Try again</a></p>
</div>
{% endif %}
{% endblock %}
