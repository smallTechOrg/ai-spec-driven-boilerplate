<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<title>{% block title %}BlogForge{% endblock %}</title>
<style>
  body { font-family: -apple-system, system-ui, sans-serif; max-width: 820px; margin: 2rem auto; padding: 0 1rem; color: #222; }
  nav { display: flex; gap: 1rem; margin-bottom: 2rem; border-bottom: 1px solid #ddd; padding-bottom: .5rem; }
  nav a { color: #0366d6; text-decoration: none; }
  h1 { margin-top: 0; }
  label { display: block; margin: .75rem 0 .25rem; font-weight: 600; }
  input[type=text], textarea, select { width: 100%; padding: .5rem; border: 1px solid #ccc; border-radius: 4px; font: inherit; }
  textarea { min-height: 8rem; }
  button { margin-top: 1rem; padding: .5rem 1rem; background: #0366d6; color: #fff; border: 0; border-radius: 4px; cursor: pointer; }
  .error { background: #ffecec; border: 1px solid #d33; color: #900; padding: .5rem 1rem; border-radius: 4px; margin-bottom: 1rem; }
  .warn { background: #fff8e1; border: 1px solid #e0b000; color: #6b4e00; padding: .5rem 1rem; border-radius: 4px; margin-bottom: 1rem; font-size: .9rem; }
  .muted { color: #888; }
  ul { padding-left: 1.2rem; }
  .card { border: 1px solid #eee; border-radius: 6px; padding: 1rem; margin-bottom: 1rem; }
  article { border-top: 1px solid #eee; padding-top: 1rem; margin-top: 1rem; }
</style>
</head>
<body>
<nav>
  <a href="/">Dashboard</a>
  <a href="/voices">Voices</a>
  <a href="/writers">Writers</a>
  <a href="/articles">Articles</a>
</nav>
{% if llm_provider == "stub" %}
<div class="warn">
  <strong>Running in stub mode.</strong> Articles are placeholder text, not AI-generated.
  Set <code>BLOGFORGE_GEMINI_API_KEY</code> in <code>.env</code> and restart to use Gemini.
</div>
{% endif %}
{% if error %}<div class="error">{{ error }}</div>{% endif %}
{% block content %}{% endblock %}
</body>
</html>
