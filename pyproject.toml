[project]
name = "blogforge"
version = "0.1.0"
description = "Voice-driven blog generator with writer personas (LangGraph + Gemini)."
requires-python = ">=3.12"
dependencies = [
  "fastapi>=0.115",
  "uvicorn>=0.32",
  "jinja2>=3.1",
  "python-multipart>=0.0.17",
  "sqlalchemy>=2.0",
  "psycopg2-binary>=2.9",
  "alembic>=1.13",
  "pydantic>=2.9",
  "pydantic-settings>=2.6",
  "langgraph>=0.2",
  "google-generativeai>=0.8",
  "markdown>=3.7",
  "structlog>=24.1",
]

[dependency-groups]
dev = [
  "pytest>=8",
  "httpx>=0.27",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/blogforge"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
