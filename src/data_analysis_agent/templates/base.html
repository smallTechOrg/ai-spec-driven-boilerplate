<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Data Analysis Agent{% endblock %}</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5f5; color: #222; line-height: 1.6; }
    .container { max-width: 800px; margin: 0 auto; padding: 2rem 1rem; }
    h1 { font-size: 1.75rem; margin-bottom: 0.5rem; }
    h2 { font-size: 1.25rem; margin-bottom: 0.75rem; }
    a { color: #0066cc; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .card { background: white; border-radius: 8px; padding: 1.5rem; box-shadow: 0 1px 4px rgba(0,0,0,0.1); margin-bottom: 1.5rem; }
    .btn { display: inline-block; padding: 0.5rem 1.25rem; background: #0066cc; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 1rem; }
    .btn:hover { background: #0052a3; }
    input[type=file], input[type=text], textarea { width: 100%; padding: 0.5rem; border: 1px solid #ccc; border-radius: 4px; font-size: 1rem; margin-bottom: 0.75rem; }
    textarea { min-height: 80px; resize: vertical; }
    .stub-banner { background: #fff3cd; border: 1px solid #ffc107; border-radius: 6px; padding: 0.6rem 1rem; margin-bottom: 1.25rem; font-size: 0.9rem; color: #856404; }
    .nav { background: white; border-bottom: 1px solid #ddd; padding: 0.75rem 1rem; margin-bottom: 2rem; }
    .nav a { margin-right: 1rem; font-weight: 500; }
    pre { background: #f4f4f4; padding: 1rem; border-radius: 6px; overflow-x: auto; white-space: pre-wrap; word-break: break-word; }
    .meta { color: #666; font-size: 0.85rem; margin-top: 0.25rem; }
    .tag { display: inline-block; background: #e8f0fe; color: #1a56db; font-size: 0.8rem; padding: 0.1rem 0.5rem; border-radius: 4px; margin: 0.1rem; }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="container" style="padding: 0 1rem;">
      <a href="/">&#x1F4CA; Data Analysis Agent</a>
    </div>
  </nav>
  <div class="container">
    {% if llm_provider == "stub" %}
    <div class="stub-banner">
      &#9888; <strong>Stub mode</strong> — Running without a Gemini API key. Answers are placeholders.
      Set <code>DATAANALYSIS_GEMINI_API_KEY</code> to enable real AI analysis.
    </div>
    {% endif %}
    {% block content %}{% endblock %}
  </div>
</body>
</html>
