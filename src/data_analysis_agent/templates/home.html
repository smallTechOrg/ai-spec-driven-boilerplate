{% extends "base.html" %}
{% block title %}Upload CSV — Data Analysis Agent{% endblock %}
{% block content %}
<div class="card">
  <h1>Data Analysis Agent</h1>
  <p style="margin-bottom: 1.25rem; color: #555;">Upload a CSV file and ask questions about your data in plain English.</p>
  <form action="/upload" method="post" enctype="multipart/form-data">
    <label for="file" style="display:block;margin-bottom:0.4rem;font-weight:500;">Choose a CSV file</label>
    <input type="file" id="file" name="file" accept=".csv" required>
    <button type="submit" class="btn">Upload &amp; Analyse</button>
  </form>
</div>
{% endblock %}
