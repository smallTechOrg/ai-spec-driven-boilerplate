<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Food Tracker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5f5; color: #222; padding: 2rem 1rem; }
    .container { max-width: 600px; margin: 0 auto; }
    h1 { font-size: 1.8rem; margin-bottom: 1.5rem; }
    .card { background: #fff; border-radius: 8px; padding: 2rem; box-shadow: 0 1px 4px rgba(0,0,0,.12); }
    .stub-banner {
      background: #fef3c7; border: 1px solid #f59e0b; border-radius: 6px;
      padding: .75rem 1rem; margin-bottom: 1.5rem;
      font-weight: 600; color: #92400e; font-size: .95rem;
    }
    a { color: #2563eb; text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
<div class="container">
  <h1>🥗 Food Tracker</h1>
  {% block content %}{% endblock %}
</div>
</body>
</html>
