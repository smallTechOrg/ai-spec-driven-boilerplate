{% extends "base.html" %}
{% block title %}Error — DataAnalyst AI{% endblock %}
{% block content %}
<div style="max-width:480px;margin:3rem auto;text-align:center;">
  <div style="font-size:3rem;margin-bottom:1rem;">⚠️</div>
  <h1 style="font-size:1.3rem;margin-bottom:0.5rem;">Something went wrong</h1>
  <p class="muted" style="margin-bottom:1.75rem;">{{ detail }}</p>
  <a href="/" class="btn">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
    Back to home
  </a>
</div>
{% endblock %}
