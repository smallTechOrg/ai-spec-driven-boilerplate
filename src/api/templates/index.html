{% extends "base.html" %}

{% block title %}Analyst{% endblock %}

{% block content %}
<h1>Data Analyst Agent</h1>

<div class="card">
  <form method="post" action="/run">
    <label for="input">Your request</label>
    <textarea id="input" name="input" rows="4" placeholder="Ask a question about your data...">{{ input or "" }}</textarea>
    <button type="submit">Run</button>
  </form>
</div>

{% if result %}
<div class="card">
  <p class="result">{{ result }}</p>
</div>
{% endif %}

{% if error %}
<div class="card">
  <p class="error">{{ error }}</p>
  <p><a href="/">Try again</a></p>
</div>
{% endif %}
{% endblock %}
